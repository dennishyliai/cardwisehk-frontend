<!DOCTYPE html>
<html lang="zh-HK" data-theme="light">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CardWise 一眼搵到最啱你嘅信用卡</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
    
    <style>
        [data-theme="dark"] {
            --bg: rgba(11, 16, 21, 1);
            --surface: rgba(41, 41, 43, 1);
            --surface2: #1c1c28;
            
            --border: rgba(42, 48, 55, 1);
            --border-hover: rgba(255, 255, 255, 0.16);
            
            --card-border1: 1px solid rgba(254, 0, 3, 0.15);
            
            --accent: #d6d6d6;
            --accent3: #e87ab0;
            --accent4: #ffffff;
            
            --text: #ffffff;
            --text2: #c8c5c0;
            --muted: #ffffff;
            
            --green: #6ee7b7;
            --red: #f87171;
            
            --nav-bg: rgba(10, 10, 15, 0.88);
            --card-hover-shadow: 0 24px 64px rgba(0, 0, 0, 0.55);
            --modal-bg: #13131a;
            --placeholder: rgba(173, 180, 190, 1);
            
            --filter-background: #13131a;
            --filter-border: rgba(42, 48, 55, 1);
            --filter-border-hover: rgba(255, 255, 255, 0.16);
            --filter-text: #ffffff;
        }

        [data-theme="light"] {
            --bg: rgb(255 255 255);
            --surface: #ffffff;
            --surface2: #ebe9e4;
            
            --border: rgba(231, 234, 240, 0.75);
            --border-hover: rgba(0, 0, 0, 0.18);
            
            --card-border1: 1px solid rgba(254, 0, 3, 0.15);
            
            --accent: #d6d6d6;
            --accent3: #982060;
            --accent4: #000000;
            
            --text: #18160f;
            --text2: #38342a;
            --muted: rgba(11, 16, 21, 0.9);
            
            --green: #0d6b45;
            --red: #b02020;
            
            --nav-bg: rgba(242, 240, 236, 0.92);
            --card-hover-shadow: 0 24px 64px rgba(0, 0, 0, 0.10);
            --modal-bg: #ffffff;
            --placeholder: rgba(102, 107, 116, 1);
            
            --filter-background: #ffffff;
            --filter-border: rgba(231, 234, 240, 0.75);
            --filter-border-hover: rgba(0, 0, 0, 0.18);
            --filter-text: rgba(11, 16, 21, 0.9);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.35s, color 0.35s;
        }

        /* Dark theme decorative gradients */
        [data-theme="dark"] body::before {
            content: '';
            position: fixed;
            top: -30%;
            left: -20%;
            width: 70%;
            height: 70%;
            background: radial-gradient(ellipse, rgba(232, 201, 122, 0.05) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        [data-theme="dark"] body::after {
            content: '';
            position: fixed;
            bottom: -20%;
            right: -10%;
            width: 50%;
            height: 60%;
            background: radial-gradient(ellipse, rgba(122, 184, 232, 0.04) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* Top Navigation */
        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 40px;
            background: var(--bg);
            backdrop-filter: blur(22px);
            transition: background 0.35s, border-color 0.35s;
        }

        .logo {
            font-family: 'DM Serif Display', serif;
            font-size: 1.35rem;
            letter-spacing: -0.02em;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo2 {
            font-family: 'DM Sans', sans-serif;
            font-size: 1.15rem;
            letter-spacing: -0.02em;
            color: var(--accent4);
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }

        .logo .ls { color: var(--text); }
        .logo .lm {
            color: var(--muted);
            font-size: 0.78em;
            font-family: 'DM Sans', sans-serif;
            font-weight: 300;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .last-updated {
            font-size: 0.71rem;
            color: var(--muted);
            margin-right: 4px;
        }

        /* Theme Toggle Pill */
        .toggle-pill {
            display: flex;
            background: var(--filter-background);
            border-radius: 18px;
            padding: 3px;
            border: 1.5px solid var(--filter-border);
            transition: background 0.35s, border-color 0.35s;
            gap: 3px;
        }

        .toggle-btn {
            padding: 5px 13px;
            border: none;
            background: transparent;
            color: var(--muted);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            font-weight: 510;
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: pre;
        }

        .toggle-btn:hover {
            background: var(--filter-border);
        }

        .toggle-btn.active {
            background: var(--filter-border);
            color: var(--filter-text);
        }

        /* Theme Button */
        .theme-btn {
            width: 34px;
            height: 34px;
            border-radius: 18px;
            border: 1.5px solid var(--filter-border);
            background: var(--filter-background);
            color: var(--filter-text);
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        @media (hover: hover) {
            .theme-btn:hover:not(.active) {
                border-color: var(--filter-border);
                background: var(--filter-border);
            }
        }

        /* Hero Section */
        .hero {
            position: relative;
            z-index: 1;
            padding: 64px 40px 42px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.72rem;
            font-weight: 500;
            letter-spacing: 0.13em;
            text-transform: uppercase;
            color: var(--accent);
            background: rgba(154, 118, 32, 0.1);
            border: 1px solid rgba(154, 118, 32, 0.25);
            padding: 5px 14px;
            border-radius: 20px;
            margin-bottom: 18px;
        }

        [data-theme="dark"] .eyebrow {
            background: rgba(232, 201, 122, 0.1);
            border-color: rgba(232, 201, 122, 0.22);
        }

        .eyebrow::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.75); }
        }

        .hero h1 {
            font-family: 'DM Sans', sans-serif;
            font-size: 26px;
            line-height: 1.1;
            letter-spacing: -0.03em;
            margin-bottom: 14px;
        }

        .hero h1 em {
            font-style: italic;
            color: var(--accent);
        }

        .hero-sub {
            font-size: 0.90rem;
            color: var(--muted);
            max-width: 500px;
            line-height: 1.75;
            margin-bottom: 0;
        }

        .stats {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        .stat-n {
            font-family: 'DM Sans', sans-serif;
            font-size: 1.9rem;
            color: var(--accent);
            line-height: 1;
        }

        .stat-l {
            font-size: 0.74rem;
            color: var(--muted);
            margin-top: 3px;
        }

        /* Controls / Search */
        .controls {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 40px 26px;
        }

        .search-wrap {
            position: relative;
            margin-bottom: 6px;
        }

        .si {
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 1.05rem;
        }

        .search-input {
            width: 100%;
            padding: 10px 42px 10px 45px;
            background: var(--border);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.88rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.35s;
        }

        .search-input::placeholder {
            color: var(--muted);
        }

        .search-clear {
            position: absolute;
            right: 13px;
            top: 50%;
            transform: translateY(-50%);
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: none;
            background: var(--surface2);
            color: var(--muted);
            font-size: 0.75rem;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            transition: background 0.18s, color 0.18s;
        }

        .search-clear:hover {
            background: var(--border-hover);
            color: var(--text);
        }

        .search-clear.visible {
            display: flex;
        }

                /* Horizontal Scroll Rows */
        .feat-row,
        .filter-row,
        .fee-row,
        .bank-row {
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            gap: 7px;
            padding: 6px 0;
            -webkit-overflow-scrolling: touch;
        }

        .feat-row::-webkit-scrollbar,
        .filter-row::-webkit-scrollbar,
        .fee-row::-webkit-scrollbar,
        .bank-row::-webkit-scrollbar {
            display: none;
        }

        .flabel {
            font-size: 0.71rem;
            color: var(--muted);
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-right: 2px;
        }

        /* ====================== "All" Feature Chip ====================== */
        .featchip.all {
            background: rgb(255 110 0 / 83%);
            color: #ffffff;
            border: 1px solid rgba(255, 110, 0, 0.45);
            transition: all 0.2s ease;
        }

        .featchip.all:hover {
            background: rgba(14, 116, 204, 0.32);
            color: #1e2f6b;
            border: 1px solid rgba(14, 116, 204, 0.70);
        }

        .featchip.all.active {
            background: rgb(255 110 0 / 83%);
            color: #ffffff;
            border: 1.5px solid rgba(255, 110, 0, 0.85);
            box-shadow: 0 0 0 4px rgba(255, 110, 0, 0.5);
        }

        /* Dark mode overrides for "All" chip */
        [data-theme="dark"] .featchip.all {
            border: 1px solid rgba(255, 154, 77, 0.85);
        }

        [data-theme="dark"] .featchip.all:hover {
            background: rgba(14, 116, 204, 0.40);
            color: #93c5fd;
            border: 1px solid rgba(14, 116, 204, 0.80);
        }

        [data-theme="dark"] .featchip.all.active {
            border: 1.5px solid rgba(255, 154, 77, 0.85);
            box-shadow: 0 0 0 4px rgba(255, 110, 0, 0.35);
        }

        /* ====================== Miles Chip ====================== */
        .featchip.miles {
            background: rgba(14, 116, 204, 0.12);
            color: rgb(0 61 153);
            border: 1.5px solid rgba(14, 116, 204, 0.3);
        }

        @media (hover: hover) {
            .featchip.miles:hover:not(.active) {
                background: rgb(10 0 255);
                color: rgb(255 255 255);
                border: 1.5px solid rgb(10 0 255);
            }
        }

        .featchip.miles.active,
        [data-theme="dark"] .featchip.miles.active {
            background: rgb(10 0 255);
            color: rgb(255 255 255);
            border: 1.5px solid rgb(10 0 255);
        }

        [data-theme="dark"] .featchip.miles {
            background: rgba(147, 197, 253, 0.18);
            color: rgb(147 197 253);
            border: 1.5px solid rgba(147, 197, 253, 0.35);
        }

        /* ====================== Cashback Chip ====================== */
        .featchip.cashback {
            background: rgb(14 204 70 / 12%);
            color: rgb(13 116 44);
            border: 1.5px solid rgb(12 141 50 / 34%);
        }

        @media (hover: hover) {
            .featchip.cashback:hover:not(.active) {
                background: rgb(14 204 70 / 100%);
                color: rgb(255 255 255);
                border: 1.5px solid rgb(14 204 70 / 100%);
            }
        }

        .featchip.cashback.active,
        [data-theme="dark"] .featchip.cashback.active {
            background: rgb(14 204 70 / 100%);
            color: rgb(255 255 255);
            border: 1.5px solid rgb(14 204 70 / 100%);
        }

        [data-theme="dark"] .featchip.cashback {
            background: rgb(14 204 70 / 12%);
            color: rgb(17 176 64);
            border: 1.5px solid rgb(14 204 70 / 44%);
        }

        /* ====================== Dining Chip ====================== */
        .featchip.dining {
            background: rgb(255 164 19 / 23%);
            color: rgb(162 99 0);
            border: 1.5px solid rgb(255 164 19 / 52%);
        }

        @media (hover: hover) {
            .featchip.dining:hover:not(.active) {
                background: rgb(255 164 19 / 100%);
                color: rgb(255 255 255);
                border: 1.5px solid rgb(255 164 19 / 100%);
            }
        }

        .featchip.dining.active,
        [data-theme="dark"] .featchip.dining.active {
            background: rgb(255 164 19 / 100%);
            color: rgb(255 255 255);
            border: 1.5px solid rgb(255 164 19 / 100%);
        }

        [data-theme="dark"] .featchip.dining {
            background: rgb(255 164 19 / 23%);
            color: rgb(220 147 34);
            border: 1.5px solid rgb(255 164 19 / 33%);
        }

        /* ====================== Online Chip ====================== */
        .featchip.online {
            background: rgb(14 204 198 / 12%);
            color: rgb(8 78 76);
            border: 1.5px solid rgb(14 125 122 / 35%);
        }

        @media (hover: hover) {
            .featchip.online:hover:not(.active) {
                background: rgb(13 156 152);
                color: rgb(255 255 255);
                border: 1.5px solid rgb(13 156 152);
            }
        }

        .featchip.online.active,
        [data-theme="dark"] .featchip.online.active {
            background: rgb(13 156 152);
            color: rgb(255 255 255);
            border: 1.5px solid rgb(13 156 152);
        }

        [data-theme="dark"] .featchip.online {
            background: rgb(14 204 198 / 23%);
            color: rgb(28 200 195);
            border: 1.5px solid rgb(14 125 122);
        }

        /* ====================== Supermarket Chip ====================== */
        .featchip.supermarket {
            background: rgb(187 14 204 / 12%);
            color: rgb(165 20 179);
            border: 1.5px solid rgb(187 14 204 / 37%);
        }

        @media (hover: hover) {
            .featchip.supermarket:hover:not(.active) {
                background: rgb(214 13 234 / 100%);
                color: rgb(255 255 255);
                border: 1.5px solid rgb(214 13 234 / 100%);
            }
        }

        .featchip.supermarket.active,
        [data-theme="dark"] .featchip.supermarket.active {
            background: rgb(214 13 234 / 100%);
            color: rgb(255 255 255);
            border: 1.5px solid rgb(214 13 234 / 100%);
        }

        [data-theme="dark"] .featchip.supermarket {
            background: rgb(187 14 204 / 21%);
            color: rgb(233 0 255);
            border: 1.5px solid rgb(187 14 204 / 58%);
        }

                /* Base Feature Chip */
        .featchip {
            padding: 6px 13px;
            border-radius: 20px;
            border: 1.5px solid var(--border);
            background: var(--surface);
            color: var(--muted);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.79rem;
            font-weight: 510;
            cursor: pointer;
            transition: all 0.18s;
            display: flex;
            align-items: center;
            white-space: pre;
            flex: 0 0 auto;
            gap: 7px;
        }

        /* Filter / Bank Chips */
        .chip,
        .fchip,
        .bchip {
            padding: 6px 13px;
            border-radius: 20px;
            border: 1.5px solid var(--filter-border);
            background: var(--filter-background);
            color: var(--filter-text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.79rem;
            font-weight: 510;
            cursor: pointer;
            transition: all 0.18s;
            display: flex;
            align-items: center;
            white-space: pre;
            flex: 0 0 auto;
        }

        @media (hover: hover) {
            .chip:hover:not(.active),
            .fchip:hover:not(.active),
            .bchip:hover:not(.active) {
                border-color: var(--filter-border);
                color: var(--filter-text);
                background: var(--filter-border);
            }
        }

        .chip.active,
        .fchip.active,
        .bchip.active {
            border-color: var(--filter-border);
            color: var(--filter-text);
            background: var(--filter-border);
        }

        /* ====================== Grid Section ====================== */
        .grid-sec {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 40px 80px;
        }

        .grid-hdr {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid var(--filter-border);
            padding: 18px 0;
        }

        .rcount {
            font-size: 0.81rem;
            margin-left: auto;
            padding-right: 10px;
        }

        .rcount strong {
            color: var(--text);
        }

        .bank-count-num {
            color: #18160f;
        }

        [data-theme="dark"] .bank-count-num {
            color: #ffffff;
        }

        .sort-sel {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.81rem;
            padding: 7px 11px;
            border-radius: 8px;
            outline: none;
            cursor: pointer;
            transition: background 0.35s;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(336px, 1fr));
            gap: 40px;
        }

        /* ====================== Credit Card Tile ====================== */
        .card {
            border-radius: 38px;
            overflow: hidden;
            border-width: 1px;
            background: var(--surface);
            transition: transform 0.22s, box-shadow 0.22s, border-color 0.22s, background 0.35s;
            cursor: pointer;
            animation: fadeUp 0.38s ease both;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(16px) saturate(180%);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: var(--card-hover-shadow);
        }

        .card-banner {
            height: 5px;
            width: 100%;
        }

        .card-hdr {
            padding: 0 13px 13px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .card-img-col {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-img-col img {
            height: 62px;
            width: auto;
            max-width: 96px;
            object-fit: contain;
            border-radius: 8px;
            display: block;
            padding: 0 0 0 4px;
        }

        .card-img-placeholder {
            width: 70px;
        }

        .card-info {
            flex: 1;
            min-width: 0;
        }

        .bank-badge {
            display: flex;
            align-items: center;
            gap: 7px;
            margin-bottom: 5px;
        }

        .logo-wrap {
            width: 22px;
            height: 22px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
            border-width: 1px;
            border-style: solid;
            transition: background 0.35s;
        }

        .logo-wrap svg,
        .logo-wrap img {
            width: 16px;
            height: 16px;
            object-fit: contain;
            border-radius: 3px;
        }

        .bname {
            font-size: 0.71rem;
            color: var(--muted);
            font-weight: 500;
            line-height: 1;
            text-align: right;
        }

        .cname {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            line-height: 1.25;
        }

        .badge {
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0;
            text-transform: uppercase;
            padding: 3px 8px;
            border-radius: 6px;
            white-space: pre;
        }

        /* Badge Variants */
        .badge.miles {
            background: rgba(14, 116, 204, 0.12);
            color: rgb(0 61 153);
            border: 1.5px solid rgba(14, 116, 204, 0.3);
        }

        [data-theme="dark"] .badge.miles {
            background: rgba(147, 197, 253, 0.18);
            color: #93c5fd;
            border: 1px solid rgba(147, 197, 253, 0.35);
        }

        .badge.cashback {
            background: rgb(14 204 70 / 12%);
            color: rgb(13 116 44);
            border: 1.5px solid rgb(14 204 70 / 100%);
        }

        [data-theme="dark"] .badge.cashback {
            background: rgb(14 204 70 / 12%);
            color: rgb(17 176 64);
            border: 1.5px solid rgb(14 204 70 / 44%);
        }

        .badge.dining {
            background: rgb(255 164 19 / 23%);
            color: rgb(162 99 0);
            border: 1.5px solid rgb(255 164 19 / 52%);
        }

        [data-theme="dark"] .badge.dining {
            background: rgb(255 164 19 / 23%);
            color: rgb(205 132 18);
            border: 1.5px solid rgb(255 164 19 / 33%);
        }

        .badge.online {
            background: rgb(14 204 198 / 12%);
            color: rgb(8 78 76);
            border: 1.5px solid rgb(14 125 122 / 35%);
        }

        [data-theme="dark"] .badge.online {
            background: rgb(14 204 198 / 23%);
            color: rgb(28 200 195);
            border: 1.5px solid rgb(14 125 122);
        }

        .badge.supermarket {
            background: rgb(187 14 204 / 12%);
            color: rgb(165 20 179);
            border: 1.5px solid rgb(187 14 204 / 37%);
        }

        [data-theme="dark"] .badge.supermarket {
            background: rgb(187 14 204 / 21%);
            color: rgb(233 0 255);
            border: 1.5px solid rgb(187 14 204 / 58%);
        }

        /* Card Footer Elements */
        .afee {
            font-size: 0.71rem;
            color: var(--muted);
        }

        .afee.free {
            color: var(--green);
            font-weight: 600;
        }

        .rhigh {
            margin: 0 13px;
            padding: 15px 15px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            transition: background 0.35s;
        }

        .ri {
            font-size: 1.15rem;
            flex-shrink: 0;
        }

        .rt {
            font-size: 0.85rem;

    <script>
    // ── BANK LOGO IMAGE PATHS (from /assets/logos/ folder in repo) ──

    function nl2br(text) {
        return (text || '').replace(/\n/g, '<br>');
    }


    // Helper: return an <img> tag using the logo image file; on error, fall back to inline SVG
    function getLogo(bank, size) {
      const sz = size || 32;
      const imgSrc = LOGO_IMGS[bank];
      const svgFallback = LOGO_SVGS[bank] || '';
      if (!imgSrc) return svgFallback;
      // Render <img> tag; onerror swaps to SVG fallback rendered as a data URI via a hidden span trick
      return `<img src="${imgSrc}" alt="${bank} logo" width="${sz}" height="${sz}"
        style="width:${sz}px;height:${sz}px;object-fit:contain;border-radius:6px;display:block"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
      /><span style="display:none;width:${sz}px;height:${sz}px;align-items:center;justify-content:center">${svgFallback}</span>`;
    }

    const LOGOS = new Proxy({}, { get: (_, bank) => getLogo(bank, 32) });

      paob:        { p:'#F47920', r:244, g:121, b:32,  hlStrong:'#fdba74' },
    };


    function getBG(bank, isDark) {
      const t = BTHEME[bank] || BTHEME.hsbc;
      const {r,g,b} = t;
      if (isDark) {
        return {
          p:        t.p,
          // Logo wrap: faint tint
          bg:       `rgba(${r},${g},${b},0.18)`,
          // Card border: visible but subtle
          bd:       `rgba(${r},${g},${b},0.38)`,
          bg2:      `rgb(198 198 198 / 10%)`,                 // card-2ndCard-bg

          // Highlight box: solid dark base strongly tinted with bank colour
          hl:       `rgba(${r},${g},${b},0.22)`,
          hlBorder: `rgba(${r},${g},${b},0.55)`,              //  card-2ndCard-subCard-border
          hlBorder2: `rgba(${r},${g},${b},0.55)`,             //  card-1stCard-border
          hlBorder3: `1px solid rgb(231 234 240 / 25%)`,      //  card-2ndCard-border

          // Text inside highlight
          hlStrong:  t.hlStrong,
        };
      } else {
        return {
          p:        t.p,

          bg:       `rgba(${r},${g},${b},0.07)`,
          bg2:      `rgb(198 198 198 / 10%)`,                 // card-2ndCard-bg

          bd:       `rgba(${r},${g},${b},0.22)`,

          hl:       `rgba(${r},${g},${b},0.03)`,      //  background
          hlBorder: `rgba(${r},${g},${b},0.6)`,               //  card-2ndCard-subCard-border
          hlBorder2: `rgba(${r},${g},${b},0.15)`,             //  card-1stCard-border
          hlBorder3: `1px solid rgb(231 234 240 / 100%)`,     //  card-2ndCard-border

          hlStrong:  t.p,
        };
      }
    }


    // ── CARDS DATA ──
    const CARDS = [
      { 
      }
    ];


    // ── STATE ──

    // Helper: split highlight into Welcome / Rewards parts for tile display
    function splitHighlight(hl, themeColor, bens, lang) {
      const cleaned = stripBrackets(hl);
      const parts = cleaned.split('|').map(s => s.trim()).filter(Boolean);

      const welcomeLabel = lang === 'zh' ? '迎新優惠' : 'WELCOME OFFER';
      const rewardsLabel = lang === 'zh' ? '獎賞' : 'REWARDS';

      // Count welcome/reward bens for helptext (change 3)
      const bensList = (bens && bens[lang]) || (bens && bens.en) || [];
      const welcomeCount = bensList.filter(b => b.c === 'w').length;
      const rewardCount  = bensList.filter(b => b.c === 'r').length;
      const moreWelcome  = welcomeCount > 1
        ? `<span style="font-size:0.7rem;opacity:0.65;margin-left:4px">+${welcomeCount - 1} ${lang==='zh'?'更多':'more'}</span>` : '';
      const moreRewards  = rewardCount  > 1
        ? `<span style="font-size:0.7rem;opacity:0.65;margin-left:4px">+${rewardCount  - 1} ${lang==='zh'?'更多':'more'}</span>` : '';

      return parts.map((part, idx) => {
        // Detect section — also match Chinese labels (迎新 / 獎賞)
        const isWelcome = /welcome/i.test(part) || /迎新/.test(part);
        const isRewards = /reward/i.test(part)  || /獎賞/.test(part);
        const sectionLabel = isWelcome ? welcomeLabel : isRewards ? rewardsLabel : '';
        const helpText     = isWelcome ? moreWelcome  : isRewards ? moreRewards  : '';

        // Strip inline <strong>Welcome:</strong> / <strong>Rewards:</strong> / Chinese equivalents prefix
        const content = part.replace(/<strong>[^<]*<\/strong>\s*/i, '').trim();

        const lineBreak = idx > 0 ? '<div style="margin-top:15px"></div>' : '';
        const labelHtml = sectionLabel
          ? `<div style="font-size:0.80rem;font-weight:700;letter-spacing:0.05em;color:${themeColor};margin-bottom: 6px;opacity:0.85;display:flex;align-items:center">${sectionLabel}${helpText}</div>`
          : '';
        return `${lineBreak}${labelHtml}<span>${content}</span>`;
      }).join('');
    }

    function closeMO(e) { if(e.target===document.getElementById('moverlay')) closeM(); }

    // ── INIT — load scraped data if available, else fall back to built-in CARDS ──
    const mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];


    function updateTimestamp(isoStr) {
      const d = isoStr ? new Date(isoStr) : new Date();
      document.getElementById('lastUpdated').textContent =
        `更新: ${d.getDate()} ${mo[d.getMonth()]} ${d.getFullYear()}`;
    }


    function normaliseScrapedCard(raw) {
      // Convert the Python CardOffer dict shape → frontend CARDS shape
      return {
        id: raw.id ? parseInt(raw.id.replace(/[^0-9]/g,'')) || Math.random()*9999|0 : Math.random()*9999|0,
        bank: raw.bank || 'other',
        bankName: { en: raw.bank_name_en || '', zh: raw.bank_name_zh || '' },
        name: { en: raw.name_en || '', zh: raw.name_zh || '' },
        annualFee: { en: raw.annual_fee_en || '', zh: raw.annual_fee_zh || '' },
        
        feeType: { en: raw.fee_type || '', zh: raw.fee_type || '' },
        miles: { en: raw.miles || '', zh: raw.miles || '' },
        cashback: { en: raw.cashback_en || '', zh: raw.cashback_zh || '' },

        badge_miles: raw.badge_miles || null,
        badge_cashback: raw.badge_cashback || null,
        badge_hot: raw.badge_hot || null,
        badge_travel: raw.badge_travel || null,
        badge_dining: raw.badge_dining || null,
        badge_supermarket: raw.badge_supermarket || null,
        badge_online: raw.badge_online || null,

        highlight: { en: raw.highlight_en || '', zh: raw.highlight_zh || '' },
        hIcon: raw.highlight_icon || '',
        cats: raw.categories || [],
        src: raw.source || 'bank',
        srcL: { en: raw.source_label_en || '', zh: raw.source_label_zh || '' },
        url_en: raw.url_en || '#',
        url_zh: raw.url_zh || '#',
        imageUrl: raw.image_url || '',
        bens: {
          en: (raw.benefits || []).map(b => ({ i: b.icon || '💳', t: b.text_en || '', c: b.cat})),
          zh: (raw.benefits || []).map(b => ({ i: b.icon || '💳', t: b.text_zh || b.text_en || '', c: b.cat })),
        }
      };
    }


    function toggleFilter() {
      const container = document.querySelector('.filter-container');
      container.classList.toggle('active');
    }


    async function loadData() {
      try {
        const res = await fetch('https://api.cardwisehk.com');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const payload = await res.json();

        if (payload.cards && payload.cards.length > 0) {
          // Replace hardcoded CARDS with live scraped data
          CARDS.length = 0;
          payload.cards.forEach(raw => CARDS.push(normaliseScrapedCard(raw)));

          // Update stats
          const banks = new Set(CARDS.map(c => c.bank)).size;
          document.querySelector('.stat-n').textContent = CARDS.length;
          document.querySelectorAll('.stat-n')[1].textContent = banks;

          // updateTimestamp(payload.generated_at);
          console.log(`✅ Loaded ${CARDS.length} live cards from cards.json (generated ${payload.generated_at})`);
        } else {
          throw new Error('Empty cards array');
        }
      } catch (e) {
        // Graceful fallback — use built-in demo data
        console.info(`ℹ️  cards.json not found or empty (${e.message}) — using built-in demo data`);
        // updateTimestamp(null);
      }
      renderCards();
    }


    loadData();
